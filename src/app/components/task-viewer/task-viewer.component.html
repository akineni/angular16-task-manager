<!-- Tabs navs -->
<ul class="nav nav-tabs mb-4 pb-2" id="ex1" role="tablist">
    <li class="nav-item" role="presentation" (click)="filterBy()">
        <a class="nav-link" role="button" [ngClass]="{'active': filterValue == ''}">All</a>
    </li>
    <li class="nav-item" role="presentation" (click)="filterBy('completed', '0')">
        <a class="nav-link" role="button" [ngClass]="{'active': filterValue == '0'}">Active</a>
    </li>
    <li class="nav-item" role="presentation" (click)="filterBy('completed', '1')">
        <a class="nav-link" role="button" [ngClass]="{'active': filterValue == '1'}">Completed</a>
    </li>
</ul>
<!-- Tabs navs -->

<!-- Tabs content -->
<div class="tab-content" id="ex1-content">
    <div class="tab-pane fade show active" role="tabpanel">
        <div class="table-responsive">
        <table class="table table-sm table-striped table-hover align-middle">
            <tbody>                  
            <tr *ngFor="let task of taskService.tasks | orderByImpure: ['completed', '-id'] | filterByImpure: [filterAttribute]: filterValue">                    
                <td>
                <input class="form-check-input me-2" type="checkbox" value="" aria-label="..."
                [checked]="task.completed" />
                </td>
                <td>
                <span [ngClass]="{'text-decoration-line-through': task.completed}">
                    {{task.task}}
                </span>
                </td>
                <td>{{task.deadline | date: 'medium'}}</td>
                <td class="text-nowrap">
                    <i class="fa-solid fa-trash-can mx-2" role="button" title="Delete" (click)="delete(task.id!)"></i>
                    <i class="fa-solid fa-pen" title="Edit"></i>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
</div>
<!-- Tabs content -->
